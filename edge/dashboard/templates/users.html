{% extends "base.html" %}

{% block content %}
<style>
  .users-page {
    padding: 38px 48px;
  }

  .page-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 24px;
  }

  .page-title {
    font-size: 30px;
    font-weight: 800;
    margin: 0;
    color: #f8fafc;
    letter-spacing: -0.03em;
  }

  .page-subtitle {
    margin-top: 8px;
    color: #9fb0c8;
    font-size: 15px;
  }

  .primary-btn {
    background: #3b82f6;
    color: #fff;
    border: 0;
    border-radius: 7px;
    padding: 12px 18px;
    font-weight: 800;
    cursor: pointer;
  }

  .panel {
    background: #172233;
    border: 1px solid #2a3a52;
    border-radius: 10px;
    padding: 22px;
  }

  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
  }

  .field,
  .select {
    background: #111a29;
    border: 1px solid #2a3a52;
    color: #e5edf9;
    border-radius: 6px;
    height: 39px;
    padding: 0 14px;
    outline: none;
  }

  .field {
    min-width: 270px;
  }

  .select {
    min-width: 140px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    color: #8fa0b9;
    font-size: 12px;
    letter-spacing: .08em;
    padding: 13px 10px;
    border-bottom: 1px solid #2a3a52;
  }

  td {
    padding: 15px 10px;
    border-bottom: 1px solid #24344c;
    color: #e5edf9;
    vertical-align: middle;
  }

  .user-cell {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #3b82f6;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    flex: 0 0 auto;
  }

  .name {
    font-weight: 800;
    color: #f8fafc;
  }

  .email {
    color: #9fb0c8;
    font-size: 13px;
    margin-top: 3px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 22px;
    padding: 0 11px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
  }

  .role-system {
    background: #153a6b;
    color: #60a5fa;
  }

  .role-home {
    background: #243044;
    color: #d7e1ef;
  }

  .status-active {
    background: #064e3b;
    color: #34d399;
  }

  .status-disabled {
    background: #4b1720;
    color: #fb7185;
  }

  .online-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  .online-dot.online {
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
  }

  .online-dot.offline {
    background: #6b7280;
  }

  .login-state-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 700;
  }

  .login-state-badge.logged-in {
    color: #34d399;
  }

  .login-state-badge.logged-out {
    color: #9ca3af;
  }

  .last-login-cell {
    font-size: 13px;
    color: #c7d2e3;
  }

  .last-login-cell .never {
    color: #6b7280;
    font-style: italic;
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    border: 1px solid #2a3a52;
    background: #111a29;
    color: #c7d2e3;
    cursor: pointer;
    font-weight: 900;
  }

  .icon-btn:hover {
    border-color: #3b82f6;
    color: #fff;
  }

  .toggle-btn {
    border-color: #b45309;
    color: #f59e0b;
  }

  .toggle-btn.disabled {
    border-color: #16a34a;
    color: #22c55e;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.62);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  .modal {
    width: min(520px, calc(100vw - 40px));
    background: #172233;
    border: 1px solid #2a3a52;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 18px 60px rgba(0,0,0,.45);
  }

  .modal h3 {
    margin: 0 0 18px;
    color: #f8fafc;
    font-size: 20px;
  }

  .form-row {
    margin-bottom: 14px;
  }

  .form-row label {
    display: block;
    color: #c7d2e3;
    font-weight: 800;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .form-row input {
    width: 100%;
    background: #111a29;
    border: 1px solid #2a3a52;
    color: #e5edf9;
    border-radius: 7px;
    height: 42px;
    padding: 0 12px;
    outline: none;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 18px;
  }

  .secondary-btn {
    background: #111a29;
    color: #e5edf9;
    border: 1px solid #2a3a52;
    border-radius: 7px;
    padding: 11px 16px;
    font-weight: 800;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    right: 30px;
    bottom: 28px;
    background: #111827;
    border: 1px solid #334155;
    color: #e5edf9;
    padding: 14px 18px;
    border-radius: 9px;
    display: none;
    z-index: 70;
    min-width: 320px;
  }

  .toast.ok {
    border-color: #2563eb;
  }

  .toast.error {
    border-color: #dc2626;
  }
</style>

<div class="users-page">
  <div class="page-head">
    <div>
      <h1 class="page-title" data-i18n="users_management">Users Management</h1>
      <div class="page-subtitle" data-i18n="users_management_desc">Manage System Owneristrators and home owners</div>
    </div>
    <button class="primary-btn" onclick="showDeferred()"><i class="ph ph-plus"></i> <span data-i18n="add_user">Add User</span></button>
  </div>

  <div class="panel">
    <div class="toolbar">
      <input id="searchInput" class="field" type="search" name="d7_users_search_input" value="" autocomplete="new-password" placeholder="Search users by name or email..." data-i18n-placeholder="search_users" oninput="this.dataset.userTyped = '1'; renderUsers()">
      <select id="roleFilter" class="select" onchange="renderUsers()">
        <option value="all" data-i18n="all_roles">All Roles</option>
        <option value="SYSTEM OWNER" data-i18n="role_sysadmin">System Owner</option>
        <option value="HOME OWNER" data-i18n="role_owner">Home Owner</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th data-i18n="col_user">USER</th>
          <th data-i18n="col_role">ROLE</th>
          <th data-i18n="col_assoc_home">ASSOCIATED HOME</th>
          <th data-i18n="status">STATUS</th>
          <th data-i18n="col_last_login">LAST LOGIN</th>
          <th data-i18n="col_actions">ACTIONS</th>
        </tr>
      </thead>
      <tbody id="usersBody">
        <tr>
          <td colspan="6"><span data-i18n="loading_users">Loading users...</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div id="ownerModal" class="modal-backdrop">
  <div class="modal">
    <h3><span data-i18n="edit_sysowner">Edit System Owner</span></h3>

    <div class="form-row">
      <label>Username</label>
      <input id="ownerUsername" placeholder="system_owner" data-i18n-placeholder="system">
    </div>

    <div class="form-row">
      <label>Email</label>
      <input id="ownerEmail" placeholder="admin@edge-system.local">
    </div>

    <div class="form-row">
      <label>New Password</label>
      <input id="ownerPassword" type="password" placeholder="Leave empty to keep current password">
    </div>

    <div class="form-row">
      <label>Confirm Password</label>
      <input id="ownerPasswordConfirm" type="password" placeholder="Confirm new password">
    </div>

    <div class="modal-actions">
      <button class="secondary-btn" onclick="closeOwnerModal()">Cancel</button>
      <button class="primary-btn" onclick="saveSystemOwner()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  let users = [];
  let systemOwner = null;
  let _usersAutoRefreshTimer = null;

  function initials(name) {
    if (!name) return "U";
    if (name === "System Owner") return "SO";
    return name.trim().slice(0, 1).toUpperCase();
  }

  function showToast(message, type = "ok") {
    const el = document.getElementById("toast");
    el.textContent = message;
    el.className = `toast ${type}`;
    el.style.display = "block";
    setTimeout(() => { el.style.display = "none"; }, 2800);
  }

  async function loadUsers() {
    try {
      const res = await fetch("/api/users-management/list", { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load users");
      const data = await res.json();
      users = data.users || [];
      systemOwner = users.find(u => u.kind === "system_owner");
      renderUsers();
    } catch (err) {
      document.getElementById("usersBody").innerHTML = `
        <tr><td colspan="6">Failed to load users.</td></tr>
      `;
      showToast(err.message || "Failed to load users", "error");
    }
  }

  function renderUsers() {
    const q = (document.getElementById("searchInput").value || "").trim().toLowerCase();
    const role = document.getElementById("roleFilter").value;

    const filtered = users.filter(u => {
      const matchSearch =
        !q ||
        (u.name || "").toLowerCase().includes(q) ||
        (u.email || "").toLowerCase().includes(q);

      const matchRole = role === "all" || u.role === role;
      return matchSearch && matchRole;
    });

    const body = document.getElementById("usersBody");

    if (!filtered.length) {
      body.innerHTML = `<tr><td colspan="6"><span data-i18n="no_users">No users found.</span></td></tr>`;
      return;
    }

    body.innerHTML = filtered.map(u => {
      const active = (u.status || "active").toLowerCase() === "active";
      const statusClass = active ? "status-active" : "status-disabled";
      const statusText = active ? "ACTIVE" : "DISABLED";
      const roleClass = u.kind === "system_owner" ? "role-system" : "role-home";

      // Online/offline dot
      const isOnline = u.is_online === true;
      const onlineDotClass = isOnline ? "online" : "offline";
      const onlineLabel = isOnline ? "Online" : "Offline";

      // Login state
      const loginState = (u.login_state || "logged_out").toLowerCase();
      const loginStateLabel = loginState === "logged_in" ? "Logged In" : "Logged Out";
      const loginStateClass = loginState === "logged_in" ? "logged-in" : "logged-out";

      let actions = "";
      if (u.kind === "system_owner") {
        actions = `<button class="icon-btn" title="${window.d7T('title_edit', 'Edit')}" onclick="openOwnerModal()">✎</button>`;
      } else {
        actions = `
          <button
            class="icon-btn toggle-btn ${active ? "" : "disabled"}"
            title="${active ? window.d7T('title_disable', 'Disable') : window.d7T('title_enable', 'Enable')}"
            onclick="toggleHomeOwner('${u.id}')"
          >${active ? "⊘" : "✓"}</button>
        `;
      }

      const statusKey = active ? "status_active" : "status_disabled";
      const statusTextTrans = window.d7T(statusKey, statusText);

      // Last login display
      const lastLoginDisplay = u.last_login && u.last_login !== "Not logged in yet"
        ? `<div>${u.last_login}</div>`
        : `<div class="never"><span data-i18n="never_logged_in">Not logged in yet</span></div>`;

      return `
        <tr>
          <td>
            <div class="user-cell">
              <div class="avatar">${initials(u.name)}</div>
              <div>
                <div class="name">${u.name || window.d7T('col_user', 'User')}</div>
                <div class="email">${u.email || ""}</div>
              </div>
            </div>
          </td>
          <td><span class="badge ${roleClass}">${window.d7T(u.role === 'SYSTEM OWNER' ? 'role_sysadmin' : 'role_owner', u.role)}</span></td>
          <td>${u.associated_home || "--"}</td>
          <td>
            <span class="badge ${statusClass}">${statusTextTrans}</span>
            <div style="margin-top:5px">
              <span class="online-dot ${onlineDotClass}"></span>
              <span style="font-size:12px;color:${isOnline ? '#34d399' : '#9ca3af'}">${onlineLabel}</span>
            </div>
            <div style="margin-top:3px">
              <span class="login-state-badge ${loginStateClass}">${loginStateLabel}</span>
            </div>
          </td>
          <td class="last-login-cell">${lastLoginDisplay}</td>
          <td><div class="actions">${actions}</div></td>
        </tr>
      `;
    }).join("");
  }

  function openOwnerModal() {
    if (!systemOwner) return;
    document.getElementById("ownerUsername").value = systemOwner.username || "system_owner";
    document.getElementById("ownerEmail").value = systemOwner.email || "";
    document.getElementById("ownerPassword").value = "";
    document.getElementById("ownerPasswordConfirm").value = "";
    document.getElementById("ownerModal").style.display = "flex";
  }

  function closeOwnerModal() {
    document.getElementById("ownerModal").style.display = "none";
  }

  async function saveSystemOwner() {
    const username = document.getElementById("ownerUsername").value.trim();
    const email = document.getElementById("ownerEmail").value.trim();
    const password = document.getElementById("ownerPassword").value;
    const confirm = document.getElementById("ownerPasswordConfirm").value;

    if (!username) return showToast("Username is required", "error");
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return showToast("Enter a valid email", "error");
    if (password || confirm) {
      if (password !== confirm) return showToast("Passwords do not match", "error");
    }

    try {
      const res = await fetch("/api/users-management/system-owner", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password: password || null })
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "Failed to update System Owner");

      closeOwnerModal();
      showToast("System Owner updated");
      await loadUsers();
    } catch (err) {
      showToast(err.message || "Failed to update System Owner", "error");
    }
  }

  async function toggleHomeOwner(homeId) {
    try {
      const res = await fetch(`/api/users-management/home-owner/${homeId}/toggle`, {
        method: "POST"
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "Failed to update account status");

      showToast(data.status === "disabled" ? "Home owner account disabled" : "Home owner account enabled");
      await loadUsers();
    } catch (err) {
      showToast(err.message || "Failed to update account status", "error");
    }
  }

  function showDeferred() {
    window.location.href = "/create-home";
  }

  // Auto-refresh users every 10 seconds for real-time status sync
  function startAutoRefresh() {
    stopAutoRefresh();
    _usersAutoRefreshTimer = setInterval(() => {
      loadUsers();
    }, 10000);
  }

  function stopAutoRefresh() {
    if (_usersAutoRefreshTimer) {
      clearInterval(_usersAutoRefreshTimer);
      _usersAutoRefreshTimer = null;
    }
  }

  // Clear search field on page load
  window.addEventListener("pageshow", function () {
    const search = document.getElementById("searchInput");
    if (search) search.value = "";
  });

  const search = document.getElementById("searchInput");
  if (search) search.value = "";

  loadUsers();
  startAutoRefresh();

  // Stop auto-refresh when page is hidden, restart when visible
  document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
      stopAutoRefresh();
    } else {
      loadUsers();
      startAutoRefresh();
    }
  });
</script>
{% endblock %}
