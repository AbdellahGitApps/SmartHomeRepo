{% extends "base.html" %}
{% block title %}Camera Monitoring{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-title">
        <h1 data-i18n="camera_monitoring">Camera Monitoring</h1>
        <p data-i18n="camera_monitoring_desc">Monitor all smart door cameras across the system</p>
    </div>
</div>

<div class="card-grid">
    <!-- Camera 1 -->
    <div class="glass-card" style="display: flex; flex-direction: column; gap: 16px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="stat-icon success" style="margin: 0; width: 40px; height: 40px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; background: rgba(16, 185, 129, 0.1); color: var(--status-success); border-radius: 50%;">
                    <i class="ph-fill ph-camera"></i>
                </div>
                <div>
                    <h3 style="font-size: 1.1rem; margin-bottom: 2px;">CAM-101-A</h3>
                    <p style="color: var(--text-secondary); font-size: 0.85rem;">Apt 101 - <span data-i18n="front_door">Front Door</span></p>
                </div>
            </div>
            <span class="badge badge-success" data-i18n="status_online">Online</span>
        </div>
    </div>

    <!-- Camera 2 -->
    <div class="glass-card" style="display: flex; flex-direction: column; gap: 16px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="stat-icon success" style="margin: 0; width: 40px; height: 40px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; background: rgba(16, 185, 129, 0.1); color: var(--status-success); border-radius: 50%;">
                    <i class="ph-fill ph-camera"></i>
                </div>
                <div>
                    <h3 style="font-size: 1.1rem; margin-bottom: 2px;">CAM-4B-A</h3>
                    <p style="color: var(--text-secondary); font-size: 0.85rem;">Apt 4B - <span data-i18n="main_door">Main Door</span></p>
                </div>
            </div>
            <span class="badge badge-success" data-i18n="status_online">Online</span>
        </div>
    </div>

    <!-- Camera 3 -->
    <div class="glass-card" style="display: flex; flex-direction: column; gap: 16px; opacity: 0.6;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="stat-icon" style="margin: 0; width: 40px; height: 40px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); border-radius: 50%;">
                    <i class="ph ph-camera-slash"></i>
                </div>
                <div>
                    <h3 style="font-size: 1.1rem; margin-bottom: 2px;">CAM-205-A</h3>
                    <p style="color: var(--text-secondary); font-size: 0.85rem;">Apt 205 - <span data-i18n="front_door">Front Door</span></p>
                </div>
            </div>
            <span class="badge badge-offline" data-i18n="status_offline">Offline</span>
        </div>
    </div>
</div>
{% endblock %}
