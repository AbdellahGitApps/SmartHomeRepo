<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} | Edge Admin</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css?v=3">
    
    <!-- i18n Dictionary -->
    <script src="/static/js/i18n.js?v=3"></script>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="ph-fill ph-cpu"></i> EdgeAdmin</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item" data-i18n="nav_dashboard">
                <i class="ph ph-squares-four"></i> Dashboard
            </a>
            <a href="/create-home" class="nav-item" data-i18n="nav_create_home">
                <i class="ph ph-house-line"></i> Create Home
            </a>
            <a href="/devices" class="nav-item" data-i18n="nav_devices">
                <i class="ph ph-devices"></i> Devices
            </a>
            <a href="/cameras" class="nav-item" data-i18n="nav_cameras">
                <i class="ph ph-camera"></i> Cameras
            </a>
            <a href="/energy" class="nav-item" data-i18n="nav_energy">
                <i class="ph ph-lightning"></i> Energy
            </a>
            <a href="/users" class="nav-item" data-i18n="nav_users">
                <i class="ph ph-users"></i> Users
            </a>
            <a href="/status" class="nav-item" data-i18n="nav_status">
                <i class="ph ph-activity"></i> System Status
            </a>
            <a href="/logs" class="nav-item" data-i18n="nav_logs">
                <i class="ph ph-shield-warning"></i> Security Logs
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Navbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menu-toggle">
                    <i class="ph ph-list"></i>
                </button>
                <div class="server-status">
                    <span class="badge badge-success" data-i18n="server_online"><i class="ph-fill ph-circle"></i> Server Online</span>
                </div>
            </div>
            <div class="topbar-right">
                <button onclick="toggleTheme()" class="btn btn-icon" style="padding: 8px; background: transparent; border: none; color: var(--text-primary); cursor: pointer;" title="Toggle Theme">
                    <i id="themeIcon" class="ph ph-sun" style="font-size: 1.2rem;"></i>
                </button>
                <button onclick="toggleLanguage()" class="btn" style="padding: 4px 8px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 0.8rem;" title="Toggle Language">
                    <span id="langLabel">EN</span>
                </button>
                <a href="#" class="nav-item" style="padding: 8px;">
                    <i class="ph ph-bell"></i>
                </a>
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="ph-fill ph-user"></i>
                    </div>
                    <span data-i18n="system_admin">System Owner</span>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <section class="content-area">
            {% block content %}
            <!-- Content will be injected here -->
            {% endblock %}
        </section>
    </main>

    <!-- Custom JS -->
    <script src="/static/js/main.js?v=2"></script>
    {% block extra_js %}{% endblock %}

<!-- PHASE8_DASHBOARD_DEVICE_ADVANCED_INFO_FIX_START -->
<script>
(function () {
  function clean(v) {
    return String(v || "").replace(/\s+/g, " ").trim();
  }

  function esc(v) {
    return String(v || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  function valueAfter(text, label) {
    var idx = text.indexOf(label);
    if (idx < 0) return "";
    var part = text.slice(idx + label.length);
    var stops = ["Device IP:", "MAC Address:", "MQTT Topic:", "Camera Stream URL:", "Camera Capture URL:"];
    var end = part.length;
    stops.forEach(function (s) {
      var p = part.indexOf(s);
      if (p >= 0 && p < end) end = p;
    });
    return clean(part.slice(0, end));
  }

  function isCameraDevice(mainText) {
    mainText = mainText.toUpperCase();
    return (
      mainText.includes("SMART_DOOR") ||
      mainText.includes("ESP32_CAM") ||
      mainText.includes("DOOR_CAMERA") ||
      mainText.includes("CAMERA") ||
      mainText.includes("DOOR")
    );
  }

  function isEnergyDevice(mainText) {
    return mainText.toUpperCase().includes("ENERGY_MONITOR");
  }

  function fixHeaders() {
    document.querySelectorAll("th, td, span, div").forEach(function (el) {
      var t = clean(el.textContent);
      if (t === "COL_LAST_SEEN") el.textContent = "Last Seen";
      if (t === "COL_ADVAN" || t === "COL_ADVANCED_INFO") el.textContent = "Advanced Info";
    });
  }

  function fixAdvancedRows() {
    if (!window.location.pathname.includes("/devices")) return;

    document.querySelectorAll("tr").forEach(function (row) {
      var rowText = clean(row.innerText || row.textContent || "");
      if (!rowText.includes("Device IP:") && !rowText.includes("Camera Stream URL:")) return;

      var mainRow = row.previousElementSibling;
      var mainText = clean(mainRow ? mainRow.innerText : "");
      var colspan = mainRow ? mainRow.children.length : 10;

      var ip = valueAfter(rowText, "Device IP:");
      var mac = valueAfter(rowText, "MAC Address:");
      var mqtt = valueAfter(rowText, "MQTT Topic:");
      var stream = valueAfter(rowText, "Camera Stream URL:");
      var capture = valueAfter(rowText, "Camera Capture URL:");

      if (!ip || ip.toLowerCase().includes("not available")) ip = "Not available yet";
      if (!mac || mac.toLowerCase().includes("not available")) mac = "Not available yet";
      if (!mqtt || mqtt.toLowerCase().includes("not available")) mqtt = "Not available yet";

      if (isEnergyDevice(mainText) && !isCameraDevice(mainText)) {
        stream = "Not applicable";
        capture = "Not applicable";
      } else if (isCameraDevice(mainText) && ip !== "Not available yet") {
        stream = "http://" + ip + "/stream";
        capture = "http://" + ip + "/capture";
      } else {
        stream = stream && !stream.toLowerCase().includes("not available") ? stream : "Not available yet";
        capture = capture && !capture.toLowerCase().includes("not available") ? capture : "Not available yet";
      }

      row.innerHTML =
        '<td colspan="' + colspan + '">' +
          '<div style="display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:18px;padding:14px 0;">' +
            '<div><strong>Device IP:</strong><br>' + esc(ip) + '</div>' +
            '<div><strong>MAC Address:</strong><br>' + esc(mac) + '</div>' +
            '<div><strong>MQTT Topic:</strong><br>' + esc(mqtt) + '</div>' +
            '<div><strong>Camera Stream URL:</strong><br>' + esc(stream) + '</div>' +
            '<div><strong>Camera Capture URL:</strong><br>' + esc(capture) + '</div>' +
          '</div>' +
        '</td>';
    });
  }

  function run() {
    fixHeaders();
    fixAdvancedRows();
  }

  document.addEventListener("DOMContentLoaded", run);
  setTimeout(run, 300);
  setTimeout(run, 1000);
})();
</script>
<!-- PHASE8_DASHBOARD_DEVICE_ADVANCED_INFO_FIX_END -->

<!-- PHASE8_HIDE_MAIN_MQTT_TOPIC_START -->
<script>
(function () {
  function clean(v) {
    return String(v || "").replace(/\s+/g, " ").trim().toUpperCase();
  }

  function hideMainMqttColumn() {
    if (!window.location.pathname.includes("/devices")) return;

    document.querySelectorAll("table").forEach(function (table) {
      var headers = Array.from(table.querySelectorAll("thead th"));
      if (!headers.length) return;

      var mqttIndex = headers.findIndex(function (th) {
        return clean(th.textContent) === "MQTT TOPIC";
      });

      if (mqttIndex < 0) return;

      headers[mqttIndex].style.display = "none";

      table.querySelectorAll("tbody tr").forEach(function (row) {
        var rowText = clean(row.innerText || row.textContent || "");

        if (rowText.includes("DEVICE IP:") || rowText.includes("MAC ADDRESS:") || rowText.includes("CAMERA STREAM URL:")) {
          return;
        }

        var cells = Array.from(row.children);
        if (cells[mqttIndex]) {
          cells[mqttIndex].style.display = "none";
        }
      });
    });
  }

  document.addEventListener("DOMContentLoaded", hideMainMqttColumn);
  setTimeout(hideMainMqttColumn, 300);
  setTimeout(hideMainMqttColumn, 1000);
})();
</script>
<!-- PHASE8_HIDE_MAIN_MQTT_TOPIC_END -->

</body>
</html>
