<!-- PHASE8_DASHBOARD_DEVICE_ADVANCED_INFO_FIX_START -->
<script>
(function () {
  function clean(v) {
    return String(v || "").replace(/\s+/g, " ").trim();
  }

  function esc(v) {
    return String(v || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  function valueAfter(text, label) {
    var idx = text.indexOf(label);
    if (idx < 0) return "";
    var part = text.slice(idx + label.length);
    var stops = ["Device IP:", "MAC Address:", "MQTT Topic:", "Camera Stream URL:", "Camera Capture URL:"];
    var end = part.length;
    stops.forEach(function (s) {
      var p = part.indexOf(s);
      if (p >= 0 && p < end) end = p;
    });
    return clean(part.slice(0, end));
  }

  function isCameraDevice(mainText) {
    mainText = mainText.toUpperCase();
    return (
      mainText.includes("SMART_DOOR") ||
      mainText.includes("ESP32_CAM") ||
      mainText.includes("DOOR_CAMERA") ||
      mainText.includes("CAMERA") ||
      mainText.includes("DOOR")
    );
  }

  function isEnergyDevice(mainText) {
    return mainText.toUpperCase().includes("ENERGY_MONITOR");
  }

  function fixHeaders() {
    document.querySelectorAll("th, td, span, div").forEach(function (el) {
      var t = clean(el.textContent);
      if (t === "COL_LAST_SEEN") el.textContent = "Last Seen";
      if (t === "COL_ADVAN" || t === "COL_ADVANCED_INFO") el.textContent = "Advanced Info";
    });
  }

  function fixAdvancedRows() {
    if (!window.location.pathname.includes("/devices")) return;

    document.querySelectorAll("tr").forEach(function (row) {
      var rowText = clean(row.innerText || row.textContent || "");
      if (!rowText.includes("Device IP:") && !rowText.includes("Camera Stream URL:")) return;

      var mainRow = row.previousElementSibling;
      var mainText = clean(mainRow ? mainRow.innerText : "");
      var colspan = mainRow ? mainRow.children.length : 10;

      var ip = valueAfter(rowText, "Device IP:");
      var mac = valueAfter(rowText, "MAC Address:");
      var mqtt = valueAfter(rowText, "MQTT Topic:");
      var stream = valueAfter(rowText, "Camera Stream URL:");
      var capture = valueAfter(rowText, "Camera Capture URL:");

      if (!ip || ip.toLowerCase().includes("not available")) ip = "Not available yet";
      if (!mac || mac.toLowerCase().includes("not available")) mac = "Not available yet";
      if (!mqtt || mqtt.toLowerCase().includes("not available")) mqtt = "Not available yet";

      if (isEnergyDevice(mainText) && !isCameraDevice(mainText)) {
        stream = "Not applicable";
        capture = "Not applicable";
      } else if (isCameraDevice(mainText) && ip !== "Not available yet") {
        stream = "http://" + ip + "/stream";
        capture = "http://" + ip + "/capture";
      } else {
        stream = stream && !stream.toLowerCase().includes("not available") ? stream : "Not available yet";
        capture = capture && !capture.toLowerCase().includes("not available") ? capture : "Not available yet";
      }

      row.innerHTML =
        '<td colspan="' + colspan + '">' +
          '<div style="display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:18px;padding:14px 0;">' +
            '<div><strong>Device IP:</strong><br>' + esc(ip) + '</div>' +
            '<div><strong>MAC Address:</strong><br>' + esc(mac) + '</div>' +
            '<div><strong>MQTT Topic:</strong><br>' + esc(mqtt) + '</div>' +
            '<div><strong>Camera Stream URL:</strong><br>' + esc(stream) + '</div>' +
            '<div><strong>Camera Capture URL:</strong><br>' + esc(capture) + '</div>' +
          '</div>' +
        '</td>';
    });
  }

  function run() {
    fixHeaders();
    fixAdvancedRows();
  }

  document.addEventListener("DOMContentLoaded", run);
  setTimeout(run, 300);
  setTimeout(run, 1000);
})();
</script>
<!-- PHASE8_DASHBOARD_DEVICE_ADVANCED_INFO_FIX_END -->

<!-- PHASE8_HIDE_MAIN_MQTT_TOPIC_START -->
<script>
(function () {
  function clean(v) {
    return String(v || "").replace(/\s+/g, " ").trim().toUpperCase();
  }

  function hideMainMqttColumn() {
    if (!window.location.pathname.includes("/devices")) return;

    document.querySelectorAll("table").forEach(function (table) {
      var headers = Array.from(table.querySelectorAll("thead th"));
      if (!headers.length) return;

      var mqttIndex = headers.findIndex(function (th) {
        return clean(th.textContent) === "MQTT TOPIC";
      });

      if (mqttIndex < 0) return;

      headers[mqttIndex].style.display = "none";

      table.querySelectorAll("tbody tr").forEach(function (row) {
        var rowText = clean(row.innerText || row.textContent || "");

        if (rowText.includes("DEVICE IP:") || rowText.includes("MAC ADDRESS:") || rowText.includes("CAMERA STREAM URL:")) {
          return;
        }

        var cells = Array.from(row.children);
        if (cells[mqttIndex]) {
          cells[mqttIndex].style.display = "none";
        }
      });
    });
  }

  document.addEventListener("DOMContentLoaded", hideMainMqttColumn);
  setTimeout(hideMainMqttColumn, 300);
  setTimeout(hideMainMqttColumn, 1000);
})();
</script>

    function currentLang() {

    }

    window.d7T = function (key, fallback) {
        const lang = currentLang();
        return (dict[lang] && dict[lang][key]) || fallback || key;
    };

    function translatePage() {
        const lang = currentLang();
        const useArabic = lang === "ar";

        document.documentElement.setAttribute("dir", useArabic ? "rtl" : "ltr");
        document.documentElement.setAttribute("lang", useArabic ? "ar" : "en");

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
            const key = el.getAttribute("data-i18n");
            const fallback = el.getAttribute("data-i18n-fallback") || el.textContent;
            const value = window.d7T(key, fallback);
            if (!value) return;

            const icon = el.querySelector("i");
            if (icon) {
                const iconHtml = icon.outerHTML;
                el.innerHTML = iconHtml + " " + value;
            } else {
                el.textContent = value;
            }
        });

        const label = document.getElementById("langLabel");
        if (label) label.textContent = useArabic ? "EN" : "AR";
    }

    window.toggleLanguage = function () {
        const next = currentLang() === "ar" ? "en" : "ar";
        localStorage.setItem("d7m16_dashboard_lang", next);
        translatePage();
        document.dispatchEvent(new CustomEvent("d7-language-changed"));
    };

    function findBellElement() {
        const icon = document.querySelector(".ph-bell, .ph-fill.ph-bell, .ph-bell-simple");
        if (!icon) return null;
        return icon.closest("a,button,div,span") || icon;
    }

    function markLogsSeenIfNeeded() {
        if (window.location.pathname === "/logs") {
            localStorage.setItem("d7m16_dashboard_logs_seen_at", String(Date.now()));
        }
    }

    async function loadNotificationBadge() {
        // D7M16_DISABLE_OLD_BADGE_UPDATER: final important-events badge script owns the visible count.
        if (window.__d7m16FinalImportantBellInstalled) return;
        const bell = findBellElement();
        if (!bell) return;

        bell.classList.add("d7m16-notification-holder");
        bell.onclick = function (event) {
            event.preventDefault();
            localStorage.setItem("d7m16_dashboard_logs_seen_at", String(Date.now()));
            window.location.href = "/logs";
        };

        let badge = bell.querySelector(".d7m16-notification-badge");
        if (!badge) {
            badge = document.createElement("span");
            badge.className = "d7m16-notification-badge";
            badge.style.display = "none";
            bell.appendChild(badge);
        }

        if (window.location.pathname === "/logs") {
            badge.style.display = "none";
            return;
        }

        try {
            const seenAt = Number(localStorage.getItem("d7m16_dashboard_logs_seen_at") || "0");
            const res = await fetch("/api/dashboard/security-logs-data?limit=100", { cache: "no-store" });
            const data = await res.json();
            const logs = data.logs || data.items || [];

            const count = logs.filter(function (log) {
                const severity = String(log.severity || "").toUpperCase();
                if (!["WARNING", "ERROR", "CRITICAL"].includes(severity)) return false;

                const rawTime = log.timestamp || log.created_at || log.time;
                const parsed = rawTime ? Date.parse(rawTime) : NaN;

                if (!seenAt) return true;
                if (Number.isNaN(parsed)) return true;
                return parsed > seenAt;
            }).length;

            if (count > 0) {
                badge.textContent = count > 99 ? "99+" : String(count);
                badge.style.display = "inline-block";
            } else {
                badge.style.display = "none";
            }
        } catch (error) {
            badge.style.display = "none";
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        markLogsSeenIfNeeded();
        translatePage();
        loadNotificationBadge();
        setInterval(loadNotificationBadge, 30000);
    });
})();
</script>

<script>
(function () {
  function showFinalDeviceToast(message, type = "success") {
    const old = document.getElementById("d7-final-device-toast");
    if (old) old.remove();

    const toast = document.createElement("div");
    toast.id = "d7-final-device-toast";
    toast.textContent = message;
    toast.style.position = "fixed";
    toast.style.right = "24px";
    toast.style.bottom = "24px";
    toast.style.zIndex = "999999";
    toast.style.padding = "12px 16px";
    toast.style.borderRadius = "10px";
    toast.style.fontWeight = "800";
    toast.style.color = "#fff";
    toast.style.background = type === "error" ? "#dc2626" : "#2563eb";
    toast.style.boxShadow = "0 10px 30px rgba(0,0,0,.35)";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  async function finalDeviceAction(deviceId, action) {
    if (!deviceId) {
      showFinalDeviceToast("Missing device ID.", "error");
      return;
    }

    action = String(action).toLowerCase();

    if (action === "remove" && !(await DashboardConfirm.show(`Remove device ${deviceId}?`, { variant: "danger", confirmText: "Delete Device" }))) return;
    if (action === "disable" && !(await DashboardConfirm.show(`Disable device ${deviceId}?`, { variant: "warning", confirmText: "Disable" }))) return;

    try {
      const response = await fetch(`/api/dashboard/final-devices/${encodeURIComponent(deviceId)}/actions/${encodeURIComponent(action)}`, {
        method: "POST",
        headers: {
          "X-Actor-Role": "system_owner",

<script>
(function () {
  function cleanId(value) {
    return String(value || "").replace(/\s+/g, "").trim();
  }

  function deletedSet() {
    try {
      return JSON.parse(localStorage.getItem("d7_deleted_devices") || "[]");
    } catch (_) {
      return [];
    }
  }

  function saveDeleted(id) {
    const clean = cleanId(id);
    const list = deletedSet();
    if (clean && !list.includes(clean)) list.push(clean);
    localStorage.setItem("d7_deleted_devices", JSON.stringify(list));
  }

  function isDeletedText(text) {
    const clean = cleanId(text);
    return deletedSet().some(id => clean.includes(id));
  }

  function extractDeviceId(input) {
    if (typeof input === "string") return cleanId(input);

    if (input && input.dataset) {
      const direct = input.dataset.deviceId || input.dataset.id || input.dataset.device;
      if (direct) return cleanId(direct);
    }

    if (input && input.closest) {
      const row = input.closest("tr");
      if (row) {
        const cells = Array.from(row.querySelectorAll("td"));
        for (const cell of cells) {
          const value = cleanId(cell.textContent);
          if (value.includes("DOOR-") || value.includes("METER-") || value.includes("CAM-")) {
            return value;
          }
        }
      }
    }

    return "";
  }

  function applyDeletedDevicesFilter() {
    document.querySelectorAll("tr, .device-card, .device-item, .connected-device").forEach(el => {
      if (isDeletedText(el.textContent)) {
        el.remove();
      }
    });
  }

  async function deleteDeviceFinal(input) {
    const id = extractDeviceId(input);

    if (!id) {
      alert("Device ID not found.");
      return;
    }

    if (!(await DashboardConfirm.show("Are you sure you want to remove this device?", { variant: "danger", confirmText: "Delete Device" }))) return;

    const response = await fetch(`/api/dashboard/final-devices-v5/${encodeURIComponent(id)}/remove`, {
      method: "POST",
      headers: {
        "X-Actor-Role": "system_owner",
        "X-System-Owner-Token": "dev-system-owner-token"
      }
    });

    const data = await response.json().catch(() => ({}));

    if (!response.ok || data.success === false) {
      alert(data.detail || data.message || "Failed to remove device.");
      return;
    }

    saveDeleted(id);
    applyDeletedDevicesFilter();

    const old = document.getElementById("d7-final-device-toast");
    if (old) old.remove();

    const box = document.createElement("div");
    box.id = "d7-final-device-toast";
    box.textContent = "Device removed from system.";
    box.style.position = "fixed";
    box.style.right = "24px";
    box.style.bottom = "24px";
    box.style.zIndex = "999999";
    box.style.padding = "12px 16px";
    box.style.borderRadius = "10px";
    box.style.fontWeight = "800";
    box.style.color = "#fff";
    box.style.background = "#2563eb";
    box.style.boxShadow = "0 10px 30px rgba(0,0,0,.35)";
    document.body.appendChild(box);
    setTimeout(() => box.remove(), 3000);
  }

  window.deleteDevice = function (input) { return deleteDeviceFinal(input); };
  window.removeDevice = function (input) { return deleteDeviceFinal(input); };

  document.addEventListener("DOMContentLoaded", function () {
    applyDeletedDevicesFilter();

    const observer = new MutationObserver(applyDeletedDevicesFilter);
    observer.observe(document.body, { childList: true, subtree: true });
  });
})();
</script>

<script>
(function () {
    "use strict";

    function textOf(el) {
        return String(el && el.textContent || "").trim();
    }

    function topVisible(el) {
        if (!el || !el.getBoundingClientRect) return false;
        const r = el.getBoundingClientRect();
        return r.top >= 70 && r.top <= 180 && r.height > 0 && r.width > 0;
    }

    function findLogout() {
        return Array.from(document.querySelectorAll("a, button")).find(function (el) {
            const data = [
                el.getAttribute("href") || "",
                el.getAttribute("onclick") || "",
                textOf(el)
            ].join(" ").toLowerCase();

            return topVisible(el) && data.includes("logout");
        });
    }

    function findOwner() {
        return Array.from(document.querySelectorAll("span, div, strong, a, button")).find(function (el) {
            return topVisible(el) && el.children.length <= 4 && textOf(el) === "System Owner";
        });
    }

    function findActionGroup(owner, logout) {
        if (!owner) return null;

        let cur = owner.parentElement;
        let best = cur;

        while (cur && cur !== document.body) {
            const r = cur.getBoundingClientRect();
            const t = textOf(cur);

            if (
                r.top >= 70 &&
                r.top <= 180 &&
                r.width > 180 &&
                r.width < 650 &&
                t.includes("System Owner")
            ) {
                best = cur;
            }

            if (logout && cur.contains(logout) && t.includes("System Owner")) {
                best = cur;
            }

            cur = cur.parentElement;
        }

        return best;
    }

    function findHeaderHost(group) {
        let cur = group ? group.parentElement : null;
        let best = cur;

        while (cur && cur !== document.body) {
            const r = cur.getBoundingClientRect();

            if (r.top >= 60 && r.top <= 180 && r.width > 700 && r.height >= 40 && r.height <= 90) {
                best = cur;
            }

            cur = cur.parentElement;
        }

        return best;
    }

    function fixRightActions() {
        const owner = findOwner();
        const logout = findLogout();

        if (!owner || !logout) return;

        const group = findActionGroup(owner, logout);
        if (!group) return;

        const host = findHeaderHost(group);
        if (host) {
            host.classList.add("d7m16-header-host-final");
        }

        group.classList.add("d7m16-actions-right-final");
        logout.classList.add("d7m16-logout-final");

        if (logout.parentElement !== group) {
            group.appendChild(logout);
        }
    }

    function findServerPill() {
        const candidates = Array.from(document.querySelectorAll("span, div, a, button"))
            .filter(function (el) {
                const t = textOf(el).replace(/\s+/g, " ").toUpperCase();
                if (!topVisible(el)) return false;
                if (!t.includes("SERVER ONLINE") && !t.includes("SERVER OFFLINE")) return false;

                const r = el.getBoundingClientRect();
                return r.left < 650 && r.width < 360 && r.height < 50;
            })
            .sort(function (a, b) {
                const ar = a.getBoundingClientRect();
                const br = b.getBoundingClientRect();
                return (ar.width * ar.height) - (br.width * br.height);
            });

        if (!candidates.length) return null;

        let pill = candidates[0];
        let cur = pill.parentElement;

        while (cur && cur !== document.body) {
            const r = cur.getBoundingClientRect();
            const t = textOf(cur).replace(/\s+/g, " ").toUpperCase();

            if (
                topVisible(cur) &&
                r.left < 650 &&
                r.width < 360 &&
                r.height < 50 &&
                (t.includes("SERVER ONLINE") || t.includes("SERVER OFFLINE"))
            ) {
                pill = cur;
            }

            cur = cur.parentElement;
        }

        return pill;
    }

    function fixServerOnline() {
        const pill = findServerPill();
        if (!pill) return;

        const raw = textOf(pill).toUpperCase();
        const isOffline = raw.includes("SERVER OFFLINE");

        pill.className = (pill.className || "")
            .replace(/\bd7m16-[^\s]+/g, "")
            .trim();

        pill.classList.add("d7m16-clean-server-pill");
        pill.classList.toggle("d7m16-offline", isOffline);

        // Ш·ВЈШёвҖЎШёвҖҰ Ш·ВіШ·В·Ш·Вұ: ШёЩ№ШёвҖҰШ·ВіШ·Вӯ Ш·В§ШёвҖһШёвҖ Ш·Вө Ш·В§ШёвҖһШёвҖҡШ·ВҜШёЩ№ШёвҖҰ Ш·В№Ш·ВҙШ·В§ШёвҖ  ШёвҖһШ·В§ ШёЩ№Ш·ВөШёЩ№Ш·Вұ SERVER ONLINE SERVER ONLINE
        pill.innerHTML = "";

        const dot = document.createElement("span");
        dot.className = "d7m16-clean-server-dot";

        const label = document.createElement("span");
        label.textContent = isOffline ? "SERVER OFFLINE" : "SERVER ONLINE";

        pill.appendChild(dot);
        pill.appendChild(label);
    }

    function applyHeaderFix() {
        fixRightActions();
        fixServerOnline();
    }

    document.addEventListener("DOMContentLoaded", function () {
        applyHeaderFix();
        setTimeout(applyHeaderFix, 150);
        setTimeout(applyHeaderFix, 500);
        setTimeout(applyHeaderFix, 1200);
    });
})();
</script>

            el.innerHTML = icon.outerHTML + " " + value;

    window.d7m16ApplyLanguageInstant = function (lang) {
        lang = lang === "ar" ? "ar" : "en";
        localStorage.setItem("d7m16_dashboard_lang", lang);

        const useArabic = lang === "ar";
        document.documentElement.setAttribute("dir", useArabic ? "rtl" : "ltr");
        document.documentElement.setAttribute("lang", useArabic ? "ar" : "en");

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
            const key = el.getAttribute("data-i18n");
            const value = (useArabic ? AR[key] : EN[key]) || el.getAttribute("data-i18n-fallback") || el.textContent;
            if (value) setTextKeepingIcon(el, value);
        });

        const label = document.getElementById("langLabel");
        if (label) label.textContent = useArabic ? "EN" : "AR";

        document.dispatchEvent(new CustomEvent("d7-language-changed", { detail: { lang: lang } }));
    };

    window.toggleLanguage = function () {
        const next = currentLang() === "ar" ? "en" : "ar";
        window.d7m16ApplyLanguageInstant(next);

        setTimeout(function () {
            window.d7m16ApplyLanguageInstant(next);
        }, 50);
    };

    document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
            window.d7m16ApplyLanguageInstant(currentLang());
        }, 0);
    });
})();
</script>

<style>

    white-space: nowrap !important;
    font-size: 0.86rem !important;

<script>
(function () {
  if (window.__d7m16GlobalDateTimeFinalFixInstalled) return;
  window.__d7m16GlobalDateTimeFinalFixInstalled = true;

  const dateTimeRe = /(\d{4}-\d{2}-\d{2})\s*,?\s+(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?/gi;

  function pad2(value) {
    return String(value || "00").padStart(2, "0");
  }

  function formatDateTime(datePart, hourPart, minutePart, secondPart, suffixPart) {
    let hour = parseInt(hourPart, 10);
    const suffix = suffixPart ? suffixPart.toUpperCase() : (hour >= 12 ? "PM" : "AM");

    if (hour > 12) hour -= 12;
    if (hour === 0) hour = 12;

    return `${datePart}, ${pad2(hour)}:${pad2(minutePart)}:${pad2(secondPart || "00")} ${suffix}`;
  }

  function normalizeDateTimeText(text) {
    if (!text || !/\d{4}-\d{2}-\d{2}/.test(text) || !/\d{1,2}:\d{2}/.test(text)) {
      return text;
    }

    return String(text).replace(
      dateTimeRe,
      function (_, datePart, hourPart, minutePart, secondPart, suffixPart) {
        return formatDateTime(datePart, hourPart, minutePart, secondPart || "00", suffixPart);
      }
    );
  }

  function isBlockedParent(node) {
    const parent = node.parentElement;
    if (!parent) return true;

    const blocked = ["SCRIPT", "STYLE", "INPUT", "TEXTAREA", "SELECT", "OPTION", "BUTTON", "PRE", "CODE"];
    return blocked.includes(parent.tagName);
  }

  function fixTextNode(node) {
    if (!node || isBlockedParent(node)) return;

    const oldText = node.nodeValue || "";
    const newText = normalizeDateTimeText(oldText);

    if (newText !== oldText) {
      node.nodeValue = newText;

      const parent = node.parentElement;
      if (parent) {
        parent.classList.add("d7m16-datetime-fixed");
        parent.setAttribute("dir", "ltr");
      }
    }
  }

  function runDateTimeFix() {
    const root = document.body || document.documentElement;
    if (!root) return;

    const walker = document.createTreeWalker(
      root,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode: function (node) {
          const text = node.nodeValue || "";
          if (!/\d{4}-\d{2}-\d{2}/.test(text) || !/\d{1,2}:\d{2}/.test(text)) {
            return NodeFilter.FILTER_REJECT;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      }
    );

    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(fixTextNode);
  }

  let timer = null;
  function scheduleFix() {
    clearTimeout(timer);
    timer = setTimeout(runDateTimeFix, 80);
  }

  document.addEventListener("DOMContentLoaded", runDateTimeFix);
  window.addEventListener("load", runDateTimeFix);
  window.addEventListener("pageshow", runDateTimeFix);

  setTimeout(runDateTimeFix, 100);
  setTimeout(runDateTimeFix, 500);
  setTimeout(runDateTimeFix, 1200);

  const target = document.body || document.documentElement;
  if (target) {
    new MutationObserver(scheduleFix).observe(target, {
      childList: true,
      subtree: true,
      characterData: true
    });
  }
})();
</script>

<script>
(function () {
  if (window.__d7m16FinalImportantBellInstalled) return;
  window.__d7m16FinalImportantBellInstalled = true;

  const importantActions = new Set([
    "MQTT DISABLE",
    "MQTT ENABLE",
    "MQTT RESTART",
    "APP RECOVERY OTP GENERATED",
    "APP PASSWORD RESET",
    "APP ADMIN REGISTERED",
    "APP SETTINGS UPDATED"
  ]);

  function findBellElement() {
    const icon = document.querySelector(".ph-bell, .ph-fill.ph-bell, .ph-bell-simple");
    if (!icon) return null;
    return icon.closest("a,button,div,span") || icon;
  }

  function getLogTime(log) {
    const raw = log.timestamp || log.created_at || log.time || "";
    const parsed = raw ? Date.parse(raw) : NaN;
    return Number.isNaN(parsed) ? 0 : parsed;
  }

  function isImportant(log) {
    const action = String(log.action_taken || "").toUpperCase().trim();
    const eventType = String(log.event_type || "").toUpperCase().trim();

    if (importantActions.has(action)) return true;

    if (
      eventType.includes("APP PASSWORD RECOVERY") ||
      eventType.includes("APP ACCOUNT") ||
      eventType.includes("SMART DOOR COMMAND") ||
      eventType.includes("ENERGY MONITOR COMMAND")
    ) {
      return true;
    }

    return false;
  }

  async function updateImportantBellBadge() {
    const bell = findBellElement();
    if (!bell) return;

    bell.classList.add("d7m16-notification-holder");
    bell.onclick = function (event) {
      event.preventDefault();
      localStorage.setItem("d7m16_dashboard_logs_seen_at", String(Date.now()));
      window.location.href = "/logs";
    };

    let badge =
      bell.querySelector(".d7m16-final-red-badge") ||
      bell.querySelector(".d7m16-notification-badge");

    if (!badge) {
      badge = document.createElement("span");
      bell.appendChild(badge);
    }

    badge.className = "d7m16-notification-badge d7m16-final-red-badge";

    if (window.location.pathname === "/logs") {
      localStorage.setItem("d7m16_dashboard_logs_seen_at", String(Date.now()));
      badge.style.setProperty("display", "none", "important");
      return;
    }

    try {
      const seenAt = Number(localStorage.getItem("d7m16_dashboard_logs_seen_at") || "0");
      const res = await fetch("/api/dashboard/security-logs-data?limit=200", { cache: "no-store" });
      const data = await res.json();
      const logs = data.logs || data.items || [];

      const count = logs.filter(function (log) {
        if (!isImportant(log)) return false;

        const logTime = getLogTime(log);
        if (!seenAt) return true;
        if (!logTime) return true;

        return logTime > seenAt;
      }).length;

      if (count > 0) {
        badge.textContent = count > 99 ? "99+" : String(count);
        badge.style.setProperty("display", "inline-block", "important");
      } else {
        badge.style.setProperty("display", "none", "important");
      }
    } catch (error) {
      badge.style.setProperty("display", "none", "important");
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    updateImportantBellBadge();
    setTimeout(updateImportantBellBadge, 300);
    setTimeout(updateImportantBellBadge, 1200);
    setInterval(updateImportantBellBadge, 5000);
  });

  window.addEventListener("pageshow", updateImportantBellBadge);
})();
</script>
