{% extends "base.html" %}
{% block title %}Security Logs
<!-- D7M16_FINAL_APARTMENT_FILTER_START -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const filtersRow =
        document.querySelector(".logs-filters") ||
        document.querySelector(".filters-row") ||
        document.querySelector(".filter-row") ||
        document.querySelector("input[placeholder*='Search']")?.parentElement;

    if (!filtersRow || document.getElementById("apartmentFilterInput")) return;

    const input = document.createElement("input");
    input.id = "apartmentFilterInput";
    input.className = "form-control";
    input.placeholder = "Apartment";
    input.style.maxWidth = "130px";
    input.style.minWidth = "110px";
    input.style.marginLeft = "10px";

    filtersRow.appendChild(input);

    function rowApartment(row) {
        const cells = Array.from(row.querySelectorAll("td"));
        if (cells.length >= 5) {
            return (cells[3]?.textContent || "").trim().toLowerCase();
        }
        return "";
    }

    function applyApartmentFilter() {
        const value = input.value.trim().toLowerCase();
        document.querySelectorAll("table tbody tr").forEach((row) => {
            if (!value) {
                row.style.display = "";
                return;
            }

            const apt = rowApartment(row);
            const text = row.textContent.toLowerCase();
            row.style.display = apt.includes(value) || text.includes(`apartment ${value}`) ? "" : "none";
        });
    }

    input.addEventListener("input", applyApartmentFilter);
});
</script>
<!-- D7M16_FINAL_APARTMENT_FILTER_END -->

<!-- D7M16_FINAL_LOG_SEARCH_EXACT_APT_START -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const searchInput =
    document.querySelector("input[placeholder*='Search']") ||
    document.querySelector("input[type='search']") ||
    document.querySelector(".logs-container input");

  if (!searchInput) return;

  searchInput.placeholder = "Search actor/event/details or exact apartment...";

  function getRows() {
    return Array.from(document.querySelectorAll("table tbody tr"));
  }

  function getCellText(row, index) {
    const cells = Array.from(row.querySelectorAll("td"));
    return (cells[index]?.textContent || "").trim();
  }

  function applyExactSearch() {
    const value = searchInput.value.trim().toLowerCase();
    const isApartmentNumber = /^[0-9]+$/.test(value);

    getRows().forEach(function (row) {
      if (!value) {
        row.style.display = "";
        return;
      }

      const apartment = getCellText(row, 4).toLowerCase();
      const rowText = row.textContent.toLowerCase();

      if (isApartmentNumber) {
        row.style.display = apartment === value ? "" : "none";
      } else {
        row.style.display = rowText.includes(value) ? "" : "none";
      }
    });
  }

  searchInput.addEventListener("input", function () {
    setTimeout(applyExactSearch, 0);
    setTimeout(applyExactSearch, 80);
  });

  document.querySelectorAll("select").forEach(function (select) {
    select.addEventListener("change", function () {
      setTimeout(applyExactSearch, 50);
    });
  });
});
</script>
<!-- D7M16_FINAL_LOG_SEARCH_EXACT_APT_END -->


<!-- D7M16_FINAL_QA_LOG_EXACT_SEARCH_FIX4_START -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const oldInput =
    document.querySelector("input[placeholder*='Search']") ||
    document.querySelector("input[type='search']") ||
    document.querySelector(".logs-container input");

  if (!oldInput) return;

  const input = oldInput.cloneNode(true);
  oldInput.parentNode.replaceChild(input, oldInput);

  input.placeholder = "Search exact apartment number or actor...";

  function columnIndex(namePart, fallback) {
    const headers = Array.from(document.querySelectorAll("table thead th"));
    const found = headers.findIndex(th => (th.textContent || "").toLowerCase().includes(namePart));
    return found >= 0 ? found : fallback;
  }

  function getRows() {
    return Array.from(document.querySelectorAll("table tbody tr"));
  }

  function getCell(row, index) {
    const cells = Array.from(row.querySelectorAll("td"));
    return (cells[index]?.textContent || "").trim();
  }

  function applySearch() {
    const value = input.value.trim().toLowerCase();
    const isNumber = /^[0-9]+$/.test(value);

    const actorIndex = columnIndex("actor", 3);
    const apartmentIndex = columnIndex("apartment", 4);

    getRows().forEach(function (row) {
      if (!value) {
        row.style.display = "";
        row.hidden = false;
        return;
      }

      const actor = getCell(row, actorIndex).toLowerCase();
      const apartment = getCell(row, apartmentIndex).toLowerCase();

      let show = false;

      if (isNumber) {
        show = apartment === value;
      } else {
        show = actor.includes(value);
      }

      row.hidden = !show;
      row.style.display = show ? "" : "none";
    });
  }

  input.addEventListener("input", function (e) {
    e.stopImmediatePropagation();
    applySearch();
  }, true);

  input.addEventListener("keyup", function (e) {
    e.stopImmediatePropagation();
    applySearch();
  }, true);

  const tbody = document.querySelector("table tbody");
  if (tbody) {
    const observer = new MutationObserver(function () {
      applySearch();
    });
    observer.observe(tbody, { childList: true, subtree: true });
  }

  document.querySelectorAll("select").forEach(function (select) {
    select.addEventListener("change", function () {
      setTimeout(applySearch, 80);
    });
  });
});
</script>
<!-- D7M16_FINAL_QA_LOG_EXACT_SEARCH_FIX4_END -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const input =
    document.querySelector("input[placeholder*='Search']") ||
    document.querySelector("input[type='search']");

  if (!input) return;

  input.placeholder = "Number = Apartment only / Text = Actor only";

  function getColumnIndex(keyword, fallback) {
    const headers = Array.from(document.querySelectorAll("table thead th"));
    const index = headers.findIndex(th => (th.textContent || "").toLowerCase().includes(keyword));
    return index >= 0 ? index : fallback;
  }

  function cell(row, index) {
    const cells = Array.from(row.querySelectorAll("td"));
    return (cells[index]?.textContent || "").trim().toLowerCase();
  }

  function applyStrictSearch() {
    const value = input.value.trim().toLowerCase();
    const isNumber = /^[0-9]+$/.test(value);

    const actorIndex = getColumnIndex("actor", 3);
    const apartmentIndex = getColumnIndex("apartment", 4);

    document.querySelectorAll("table tbody tr").forEach(row => {
      if (!value) {
        row.style.removeProperty("display");
        return;
      }

      const actor = cell(row, actorIndex);
      const apartment = cell(row, apartmentIndex);

      let show = false;

      if (isNumber) {
        show = apartment === value;
      } else {
        show = actor.includes(value);
      }

      if (show) {
        row.style.removeProperty("display");
      } else {
        row.style.setProperty("display", "none", "important");
      }
    });
  }

  input.addEventListener("input", function (e) {
    e.stopImmediatePropagation();
    applyStrictSearch();
  }, true);

  input.addEventListener("keyup", function (e) {
    e.stopImmediatePropagation();
    applyStrictSearch();
  }, true);

  setInterval(applyStrictSearch, 250);
});
</script>

<script>
let allLogs = [];
let currentLogs = [];

function escapeHtml(value) {
    if (value === null || value === undefined) return "";
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function severityBadge(severity) {
    const value = String(severity || "INFO").toUpperCase();

    if (value === "CRITICAL" || value === "ERROR") {
        return `<span class="badge badge-danger">${value}</span>`;
    }

    if (value === "WARNING") {
        return `<span class="badge badge-warning">WARNING</span>`;
    }

    return `<span class="badge badge-success">INFO</span>`;
}

function parseLogDate(value) {
    if (!value) return 0;

    const text = String(value).trim();

    let date = new Date(text);
    if (!Number.isNaN(date.getTime())) return date.getTime();

    const fixed = text.replace("T", " ").replace(/\+\d{2}:\d{2}$/, "");
    date = new Date(fixed);
    if (!Number.isNaN(date.getTime())) return date.getTime();

    return 0;
}

function formatTimestamp(value) {
    if (!value) return "-";

    const time = parseLogDate(value);
    if (!time) return String(value);

    const date = new Date(time);
    const pad = (n) => String(n).padStart(2, "0");

    const year = date.getFullYear();
    const month = pad(date.getMonth() + 1);
    const day = pad(date.getDate());

    let hour = date.getHours();
    const ampm = hour >= 12 ? "PM" : "AM";
    hour = hour % 12;
    if (hour === 0) hour = 12;

    return `${year}-${month}-${day}, ${pad(hour)}:${pad(date.getMinutes())}:${pad(date.getSeconds())} ${ampm}`;
}

function tryParseJson(value) {
    if (!value) return null;

    const text = String(value).trim();
    if (!text.startsWith("{") && !text.startsWith("[")) return null;

    try {
        return JSON.parse(text);
    } catch {
        return null;
    }
}

function textOf(log) {
    return [
        log.actor,
        log.source,
        log.event_type,
        log.details,
        log.action_taken,
        log.device_type,
        log.device_name,
        log.device_id,
        log.apartment_number,
        log.home_number,
        log.home,
        log.home_id
    ].join(" ");
}

function extractApartmentFromText(value) {
    const text = String(value || "");

    const homeMatch = text.match(/HOME[-_]?0*(\d+)/i);
    if (homeMatch) return String(Number(homeMatch[1]));

    const aptMatch = text.match(/APT[-_]?0*(\d+)/i);
    if (aptMatch) return String(Number(aptMatch[1]));

    const apartmentMatch = text.match(/apartment\s*0*(\d+)/i);
    if (apartmentMatch) return String(Number(apartmentMatch[1]));

    return "";
}

function formatApartment(log) {
    const direct = log.apartment_number || log.home_number || log.apartment || log.home || log.home_id || "";
    const directText = String(direct || "").trim();

    if (directText && directText.toLowerCase() !== "system") {
        const fromDirect = extractApartmentFromText(directText);
        if (fromDirect) return fromDirect;

        if (/^\d+$/.test(directText)) return directText;
    }

    const fromFullText = extractApartmentFromText(textOf(log));
    if (fromFullText) return fromFullText;

    return "-";
}

function detectEventType(log) {
    const raw = textOf(log).toLowerCase();
    const parsed = tryParseJson(log.details || "");
    const command = String(parsed?.command || parsed?.action || "").toLowerCase();

    if (
        raw.includes("login") ||
        raw.includes("logout") ||
        raw.includes("failed dashboard") ||
        raw.includes("failed login") ||
        raw.includes("system owner logged")
    ) {
        return "System Security";
    }

    if (
        raw.includes("critical") ||
        raw.includes("db error") ||
        raw.includes("api error") ||
        raw.includes("backend error") ||
        raw.includes("publish failed") ||
        raw.includes("mqtt failed") ||
        raw.includes("connection failed")
    ) {
        return "System Error";
    }

    if (
        raw.includes("family") ||
        raw.includes("member added") ||
        raw.includes("member enabled") ||
        raw.includes("member disabled")
    ) {
        return "Family Management";
    }

    if (
        raw.includes("face") ||
        raw.includes("unknown person") ||
        raw.includes("unknown_face") ||
        raw.includes("recognition") ||
        raw.includes("access denied") ||
        raw.includes("access granted")
    ) {
        return "Face Recognition";
    }

    if (
        raw.includes("high energy") ||
        raw.includes("voltage abnormal") ||
        raw.includes("current abnormal") ||
        raw.includes("energy warning") ||
        raw.includes("sensor offline") ||
        raw.includes("energy sensor offline")
    ) {
        return "Energy Warning";
    }

    if (
        raw.includes("energy") ||
        raw.includes("meter") ||
        raw.includes("energy_monitor") ||
        raw.includes("meter-home")
    ) {
        return "Energy Monitor Command";
    }

    if (
        raw.includes("door opened successfully") ||
        raw.includes("door locked successfully") ||
        raw.includes("door status") ||
        raw.includes("servo") ||
        raw.includes("esp32")
    ) {
        return "Smart Door Event";
    }

    if (
        raw.includes("smart door") ||
        raw.includes("door_open") ||
        raw.includes("door open") ||
        raw.includes("mqtt door") ||
        raw.includes("front door") ||
        raw.includes("door-home") ||
        raw.includes("smart_door") ||
        command === "open" ||
        command === "lock" ||
        command === "unlock"
    ) {
        return "Smart Door Command";
    }

    return log.event_type || "System Security";
}

function detectActor(log, eventType) {
    const actionTaken = String(log.action_taken || "").toUpperCase();
    if (["APP SETTINGS UPDATED", "APP ADMIN REGISTERED", "APP PASSWORD RESET"].includes(actionTaken)) {
        return "Admin App";
    }

    const raw = textOf(log).toLowerCase();

    if (
        raw.includes("failed login") ||
        raw.includes("invalid username") ||
        raw.includes("invalid password")
    ) {
        return "Unknown";
    }

    if (raw.includes("system_owner") || raw.includes("system owner") || raw.includes("dashboard")) {
        return "System Owner";
    }

    if (
        raw.includes("flutter") ||
        raw.includes("admin app") ||
        raw.includes("flutter_app") ||
        raw.includes("manual_open_from_flutter") ||
        eventType === "Family Management"
    ) {
        return "Admin App";
    }

    if (
        raw.includes("esp32") ||
        raw.includes("device heartbeat") ||
        raw.includes("device event") ||
        raw.includes("servo") ||
        eventType === "Smart Door Event"
    ) {
        return "ESP32 Device";
    }

    if (
        eventType === "System Error" ||
        eventType === "Face Recognition" ||
        eventType === "Energy Warning" ||
        eventType === "System Security"
    ) {
        return "Server";
    }

    if (
        eventType === "Smart Door Command" ||
        eventType === "Energy Monitor Command"
    ) {
        return "System Owner";
    }

    return "Server";
}

function cleanDetails(log, eventType) {
    const raw = log.details || "";
    const parsed = tryParseJson(raw);

    if (parsed) {
        const command = String(parsed.command || parsed.action || "").toLowerCase();

        if (eventType === "Smart Door Command") {
            if (command === "open") return "Open command sent to Smart Door";
            if (command === "lock") return "Lock command sent to Smart Door";
            if (command === "unlock") return "Unlock command sent to Smart Door";
            if (command) return `${command.toUpperCase()} command sent to Smart Door`;
            return "Smart Door command sent through FastAPI → MQTT.";
        }

        if (eventType === "Energy Monitor Command") {
            if (command) return `${command.toUpperCase()} command sent to Energy Monitor`;
            return "Energy Monitor command sent through FastAPI → MQTT.";
        }

        return parsed.message || parsed.reason || parsed.status || "System event recorded.";
    }

    let text = String(raw || "-");

    text = text.replace(/\s*through FastAPI\s*(->|→)\s*MQTT\.?/i, "");
    text = text.replace(/\s+/g, " ").trim();

    return text || "-";
}

function normalizeAction(log, eventType) {
    const action = String(log.action_taken || "").trim();

    if (action) return action;

    const parsed = tryParseJson(log.details || "");
    const command = String(parsed?.command || parsed?.action || "").toUpperCase();

    if (eventType === "Smart Door Command" && command) return `MQTT DOOR ${command}`;
    if (eventType === "Energy Monitor Command" && command) return `MQTT ${command}`;
    if (eventType === "Energy Warning") return "Warning Raised";
    if (eventType === "System Error") return "Error Logged";
    if (eventType === "System Security") return "Security Logged";

    return "-";
}

function normalizeSeverity(log, eventType) {
    let severity = String(log.severity || "INFO").toUpperCase();
    const action = String(log.action_taken || "").toUpperCase();
    const details = String(log.details || "").toLowerCase();

    if (
        action === "UNKNOWN OPEN ONCE" ||
        action === "DOOR OPENED AFTER FAMILY ADD" ||
        action === "FAMILY MEMBER ADDED"
    ) {
        return "INFO";
    }

    if (
        action === "UNKNOWN DENIED" ||
        action === "UNKNOWN FACE DETECTED"
    ) {
        return "WARNING";
    }

    if (eventType === "System Error") {
        if (severity === "INFO") return "ERROR";
    }

    if (
        eventType === "Energy Warning" ||
        action.includes("DISABLE") ||
        details.includes("disabled")
    ) {
        if (severity === "INFO") return "WARNING";
    }

    return severity;
}

function normalizeLog(log) {
    const eventType = detectEventType(log);

    return {
        id: log.id || log.source_id || log.log_id || "",
        timestamp: log.timestamp || log.created_at || log.time || "",
        severity: normalizeSeverity(log, eventType),
        actor: detectActor(log, eventType),
        apartment: formatApartment(log),
        event_type: eventType,
        details: cleanDetails(log, eventType),
        action_taken: normalizeAction(log, eventType)
    };
}


function logDateKey(value) {
    const time = parseLogDate(value);
    if (!time) return "";

    const date = new Date(time);
    const pad = (n) => String(n).padStart(2, "0");

    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

function buildDateFilter() {
    const select = document.getElementById("dateFilter");
    if (!select) return;

    const current = select.value;

    const dates = Array.from(new Set(
        allLogs
            .map((log) => logDateKey(log.timestamp))
            .filter(Boolean)
    )).sort((a, b) => b.localeCompare(a));

    select.innerHTML = `<option value="">All Dates</option>` + dates.map((date) => {
        return `<option value="${date}">${date}</option>`;
    }).join("");

    if (dates.includes(current)) {
        select.value = current;
    }
}

function renderLogs(logs) {
    const tbody = document.getElementById("logsTableBody");

    if (!logs.length) {
        tbody.innerHTML = `
            <tr>
                <td colspan="9" style="text-align:center; color:var(--text-secondary); padding:24px;">
                    No logs found.
                </td>
            </tr>
        `;
        return;
    }

    tbody.innerHTML = logs.map((log, index) => `
        <tr>
            <td>${index + 1}</td>
            <td class="d7m16-log-timestamp" dir="ltr" style="white-space:nowrap; min-width:245px; width:245px; max-width:245px; direction:ltr; unicode-bidi:isolate;">${escapeHtml(formatTimestamp(log.timestamp))}</td>
            <td>${severityBadge(log.severity)}</td>
            <td>${escapeHtml(log.actor)}</td>
            <td>${escapeHtml(log.apartment)}</td>
            <td>${escapeHtml(log.event_type)}</td>
            <td>${escapeHtml(log.details)}</td>
            <td>${escapeHtml(log.action_taken)}</td>
            <td style="text-align:right;">
                <button class="btn btn-outline" style="color:#ef4444;border-color:#ef4444;padding:6px 9px;" onclick="deleteSingleLogFinal('${log.id}')">
                    <i class="ph ph-trash"></i>
                </button>
            </td>
        </tr>
    `).join("");
}

function applyFilters() {
    const searchInput = document.getElementById("logSearch");
    const search = searchInput ? searchInput.value.toLowerCase().trim() : "";
    const isNumberSearch = /^[0-9]+$/.test(search);

    const dateFilter = document.getElementById("dateFilter").value;
    const actorFilter = document.getElementById("actorFilter") ? document.getElementById("actorFilter").value : "";
    const eventFilter = document.getElementById("eventFilter").value;
    const severityFilter = document.getElementById("severityFilter").value;

    currentLogs = allLogs.filter((log) => {
        const apartment = String(log.apartment || "").trim().toLowerCase();
        const actor = String(log.actor || "").trim().toLowerCase();

        let matchesSearch = true;

        if (search) {
            if (isNumberSearch) {
                matchesSearch = apartment === search;
            } else {
                matchesSearch = actor.includes(search);
            }
        }

        const matchesDate = !dateFilter || logDateKey(log.timestamp) === dateFilter;
        const matchesActor = !actorFilter || log.actor === actorFilter;
        const matchesEvent = !eventFilter || log.event_type === eventFilter;
        const matchesSeverity = !severityFilter || log.severity === severityFilter;

        return matchesSearch && matchesDate && matchesActor && matchesEvent && matchesSeverity;
    });

    renderLogs(currentLogs);
}

async function fetchLogs() {
    const endpoints = [
        "/api/dashboard/security-logs-data",
        "/api/logs"
    ];

    for (const endpoint of endpoints) {
        try {
            const response = await fetch(endpoint);
            if (!response.ok) continue;

            const data = await response.json();

            if (Array.isArray(data)) return data;

            const items = data.items || data.logs || data.data || [];
            if (Array.isArray(items)) return items;
        } catch (error) {
            console.warn("Logs endpoint failed:", endpoint, error);

<script>
(function () {
  function lower(value) {
    return String(value || "").toLowerCase();
  }

  function deviceIdFromLog(log) {
    const text = [
      log.details,
      log.action_taken,
      log.event_type
    ].join(" ");

    const match = text.match(/\b(?:DOOR|METER|CAM)-HOME[0-9]+-\d+\b/i);
    return match ? match[0].toUpperCase() : "";
  }

  function apartmentFromDeviceId(deviceId) {
    const match = String(deviceId || "").match(/(?:DOOR|METER|CAM)-HOME0*([0-9]+)-/i);
    if (!match) return "";
    return String(parseInt(match[1], 10));
  }

  function rawSecond(value) {
    return String(value || "").replace("T", " ").split(".")[0].slice(0, 19);
  }

  function normalizeDashboardCommandLog(log) {
    const fixed = Object.assign({}, log);
    const action = String(fixed.action_taken || "").toUpperCase();
    const eventType = String(fixed.event_type || "");

    if (lower(fixed.actor) === "server" && eventType.toLowerCase().includes("command") && action.startsWith("MQTT")) {
      fixed.actor = "System Owner";
    }

    const deviceId = deviceIdFromLog(fixed);
    const apt = apartmentFromDeviceId(deviceId);

    if (apt) {
      fixed.apartment = apt;
    }

    if (action.includes("REMOVE") && deviceId) {
      fixed.details = `Remove command sent to ${deviceId}`;
    }

    return fixed;
  }

  function logScore(log) {
    let score = 0;
    if (String(log.actor || "") === "System Owner") score += 4;
    if (/^Remove command sent to (DOOR|METER|CAM)-/i.test(String(log.details || ""))) score += 4;
    if (!String(log.details || "").includes("(")) score += 1;
    return score;
  }

  function dedupeCommandLogs(logs) {
    const map = new Map();
    const result = [];

    logs.forEach(item => {
      const log = normalizeDashboardCommandLog(item);
      const deviceId = deviceIdFromLog(log);
      const action = String(log.action_taken || "").toUpperCase();
      const key = deviceId && action
        ? `${rawSecond(log.timestamp)}|${action}|${deviceId}`
        : `unique|${Math.random()}|${result.length}`;

      if (!map.has(key)) {
        map.set(key, log);
        result.push(log);
        return;
      }

      const old = map.get(key);
      if (logScore(log) > logScore(old)) {
        map.set(key, log);
        const index = result.indexOf(old);
        if (index >= 0) result[index] = log;
      }
    });

    return result;
  }

  window.applyFilters = function () {
    const searchEl = document.getElementById("logSearch");
    const dateEl = document.getElementById("dateFilter");
    const eventEl = document.getElementById("eventFilter");
    const severityEl = document.getElementById("severityFilter");

    const search = searchEl ? searchEl.value.toLowerCase().trim() : "";
    const dateFilter = dateEl ? dateEl.value : "";
    const eventFilter = eventEl ? eventEl.value : "";
    const severityFilter = severityEl ? severityEl.value : "";
    const isNumber = /^[0-9]+$/.test(search);

    currentLogs = dedupeCommandLogs(allLogs).filter((log) => {
      const matchesDate = !dateFilter || logDateKey(log.timestamp) === dateFilter;
      const matchesEvent = !eventFilter || log.event_type === eventFilter;
      const matchesSeverity = !severityFilter || log.severity === severityFilter;

      let matchesSearch = true;

      if (search) {
        if (isNumber) {
          matchesSearch = String(log.apartment || "").trim() === search;
        } else {
          matchesSearch = lower(log.actor).includes(search);
        }
      }

      return matchesSearch && matchesDate && matchesEvent && matchesSeverity;
    });

    renderLogs(currentLogs);
  };

  window.loadLogs = async function () {
    const tbody = document.getElementById("logsTableBody");

    if (tbody) {
      tbody.innerHTML = `
        <tr>
          <td colspan="9" style="text-align:center; color:var(--text-secondary); padding:24px;">
            Loading logs...
          </td>
        </tr>
      `;
    }

    const items = await fetchLogs();

    allLogs = dedupeCommandLogs(
      items
        .map(normalizeLog)
        .map(normalizeDashboardCommandLog)
    ).sort((a, b) => parseLogDate(b.timestamp) - parseLogDate(a.timestamp));

    buildDateFilter();
    applyFilters();
  };

  document.addEventListener("DOMContentLoaded", function () {
    const searchEl = document.getElementById("logSearch");
    if (searchEl) {
      searchEl.placeholder = "Number = Apartment only / Text = Actor only";
    }
  });
})();
</script>

<script>
(function () {
  if (window.__d7ActorFilterWorkingFinalInstalled) return;
  window.__d7ActorFilterWorkingFinalInstalled = true;

  function lower(value) {
    return String(value || "").trim().toLowerCase();
  }

  function actorBucket(value) {
    const raw = lower(value);

    if (!raw) return "";

    if (
      raw === "system owner" ||
      raw === "system_owner" ||
      raw.includes("system owner") ||
      raw.includes("system_owner") ||
      raw.includes("dashboard")
    ) {
      return "System Owner";
    }

    if (
      raw === "admin app" ||
      raw.includes("admin app") ||
      raw.includes("flutter") ||
      raw.includes("owner app") ||
      raw.includes("app settings") ||
      raw.includes("family management")
    ) {
      return "Admin App";
    }

    if (
      raw === "server" ||
      raw.includes("server") ||
      raw.includes("esp32") ||
      raw.includes("device") ||
      raw.includes("face recognition") ||
      raw.includes("energy warning") ||
      raw.includes("system security") ||
      raw.includes("system error")
    ) {
      return "Server";
    }

    return value || "";
  }

  function dateKey(value) {
    if (typeof logDateKey === "function") {
      return logDateKey(value);
    }

    const text = String(value || "").trim();
    return text.length >= 10 ? text.slice(0, 10) : "";
  }

  function sourceLogs() {
    let logs = [];

    try {
      logs = Array.isArray(window.allLogs) ? window.allLogs : allLogs;
    } catch (_) {
      logs = [];
    }

    if (!Array.isArray(logs)) {
      logs = [];
    }

    if (typeof dedupeCommandLogs === "function") {
      logs = dedupeCommandLogs(logs);
    }

    return logs;
  }

  window.applyFilters = function () {
    const searchEl = document.getElementById("logSearch");
    const dateEl = document.getElementById("dateFilter");
    const actorEl = document.getElementById("actorFilter");
    const eventEl = document.getElementById("eventFilter");
    const severityEl = document.getElementById("severityFilter");

    const search = lower(searchEl ? searchEl.value : "");
    const isNumberSearch = /^[0-9]+$/.test(search);

    const selectedDate = dateEl ? dateEl.value : "";
    const selectedActor = actorBucket(actorEl ? actorEl.value : "");
    const selectedEvent = eventEl ? eventEl.value : "";
    const selectedSeverity = severityEl ? severityEl.value : "";

    const filtered = sourceLogs().filter(function (log) {
      const apartment = lower(log.apartment || log.apartment_number || log.home || log.home_id || "");
      const actor = actorBucket(log.actor || "");
      const eventType = log.event_type || "";
      const severity = log.severity || "";

      let matchesSearch = true;

      if (search) {
        if (isNumberSearch) {
          matchesSearch = apartment === search;
        } else {
          matchesSearch = lower(actor).includes(search);
        }
      }

      const matchesDate = !selectedDate || dateKey(log.timestamp || log.created_at) === selectedDate;
      const matchesActor = !selectedActor || actor === selectedActor;
      const matchesEvent = !selectedEvent || eventType === selectedEvent;
      const matchesSeverity = !selectedSeverity || severity === selectedSeverity;

      return matchesSearch && matchesDate && matchesActor && matchesEvent && matchesSeverity;
    });

    try {
      currentLogs = filtered;
    } catch (_) {}

    window.currentLogs = filtered;

    if (typeof renderLogs === "function") {
      renderLogs(filtered);
    }
  };

  function wireActorFilter() {
    ["logSearch", "dateFilter", "actorFilter", "eventFilter", "severityFilter"].forEach(function (id) {
      const el = document.getElementById(id);
      if (!el || el.dataset.d7ActorFilterWired === "1") return;

      el.dataset.d7ActorFilterWired = "1";
      el.addEventListener("input", window.applyFilters);
      el.addEventListener("change", window.applyFilters);
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    wireActorFilter();

    setTimeout(function () {
      wireActorFilter();
      if (typeof window.applyFilters === "function") {
        window.applyFilters();
      }
    }, 150);
  });

  window.addEventListener("pageshow", function () {
    wireActorFilter();
    if (typeof window.applyFilters === "function") {
      window.applyFilters();
    }
  });
})();
</script>
