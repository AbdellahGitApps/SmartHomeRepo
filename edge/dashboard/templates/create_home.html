{% extends "base.html" %}
{% block title %}Create Home{% endblock %}

{% block content %}

<style>
.d7-owner-stack {
    width: 50%;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 38px;
}

.d7-owner-stack .form-group {
    margin-bottom: 0 !important;
}

.d7-owner-stack label {
    display: block;
    margin-bottom: 7px;
}

@media (max-width: 900px) {
    .d7-owner-stack {
        width: 100%;
        min-width: 0;
    }
}
</style>

<div class="page-header">
    <div class="page-title">
        <h1 data-i18n="register_new_home">Register New Home</h1>
        <p data-i18n="create_home_desc">Add a new home to the Edge Smart System</p>
    </div>
</div>

<div class="glass-card" style="max-width: 800px;">
    <form id="createHomeForm">
        
        <h3 style="margin-bottom: 20px; color: var(--accent-primary); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;" data-i18n="apt_info">Apartment Information</h3>
        
        <div class="form-group">
            <label for="apartmentNumber" data-i18n="apt_number_label">Apartment Number</label>
            <input type="text" id="apartmentNumber" class="form-control" placeholder="e.g. 36" required style="max-width: 50%;">
        </div>
        
        <h3 style="margin-bottom: 20px; margin-top: 30px; color: var(--accent-primary); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;" data-i18n="owner_info">Owner Information</h3>

        <div class="d7-owner-stack">
            <div class="form-group">
                <label for="ownerName" data-i18n="owner_name">Owner Name</label>
                <input type="text" id="ownerName" class="form-control" placeholder="e.g. John Doe" required>
            </div>

            <div class="form-group">
                <label for="ownerEmail" data-i18n="owner_email">Owner Email</label>
                <input type="email" id="ownerEmail" class="form-control" placeholder="e.g. john@example.com" required>
            </div>

            <div class="form-group">
                <label for="ownerPhone">Owner Phone</label>
                <input
                    type="text"
                    id="ownerPhone"
                    class="form-control"
                    placeholder="e.g. 781294263"
                    inputmode="numeric"
                    maxlength="9"
                    pattern="[0-9]{9}"
                    required
                >
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); margin-top: 30px; margin-bottom: 20px; padding-bottom: 10px;">
            <h3 style="margin: 0; color: var(--accent-primary);" data-i18n="device_reg">Device Registration</h3>
            <button type="button" class="btn btn-outline" onclick="addDeviceEntry()" style="padding: 6px 12px; font-size: 0.9em;">
                <i class="ph ph-plus"></i> <span data-i18n="add_device">Add Device</span>
            </button>
        </div>

        <div id="devicesContainer">
            <!-- Pre-filled default examples -->
            <div class="device-entry" style="padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label data-i18n="col_device_name">Device Name</label>
                    <input type="text" class="form-control" placeholder="e.g. Front Door Camera" placeholder="Front Door Camera" data-i18n-placeholder="front_door" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Device Type</label>
                    <select class="form-control" required>
                        <option value="">Select Type</option>
                        <option value="smart_door" selected>smart_door</option>
                        <option value="energy_monitor">energy_monitor</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <button type="button" class="btn" onclick="this.closest('.device-entry').remove()" style="padding: 10px 15px; background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; cursor: pointer;" title="Remove Device">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
            </div>

            <div class="device-entry" style="padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label data-i18n="col_device_name">Device Name</label>
                    <input type="text" class="form-control" placeholder="e.g. Main Energy Meter" placeholder="Main Energy Meter" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Device Type</label>
                    <select class="form-control" required>
                        <option value="">Select Type</option>
                        <option value="smart_door">smart_door</option>
                        <option value="energy_monitor" selected>energy_monitor</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <button type="button" class="btn" onclick="this.closest('.device-entry').remove()" style="padding: 10px 15px; background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; cursor: pointer;" title="Remove Device">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
            </div>
        </div>

        <h3 style="margin-bottom: 20px; margin-top: 30px; color: var(--accent-primary); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;" data-i18n="admin_notes">Administrative Notes</h3>
        
        <div class="form-group">
            <label for="notes" data-i18n="admin_notes_label">Administrative Notes (Optional)</label>
            <textarea id="notes" class="form-control" rows="4" placeholder="Installation notes, apartment remarks, internal admin comments..."></textarea>
        </div>

        <div style="display: flex; gap: 16px; margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--glass-border);">
            <button type="submit" class="btn btn-primary"><i class="ph ph-check"></i> <span data-i18n="register_home_btn">Register Home & Devices</span></button>
            <button type="reset" class="btn btn-outline" onclick="resetDevices()"><i class="ph ph-arrow-counter-clockwise"></i> <span data-i18n="reset_form">Reset Form</span></button>
        </div>
    </form>
</div>

<script>
    function addDeviceEntry() {
        const container = document.getElementById('devicesContainer');
        const entryHtml = `
            <div class="device-entry" style="padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end; animation: fadeIn 0.3s ease;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label data-i18n="col_device_name">Device Name</label>
                    <input type="text" class="form-control" placeholder="e.g. Living Room Smart Door" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Device Type</label>
                    <select class="form-control" required>
                        <option value="">Select Type</option>
                        <option value="smart_door">smart_door</option>
                        <option value="energy_monitor">energy_monitor</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <button type="button" class="btn" onclick="this.closest('.device-entry').remove()" style="padding: 10px 15px; background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; cursor: pointer;" title="Remove Device">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', entryHtml);
    }
    
    function resetDevices() {
        setTimeout(() => {
            window.location.reload();
        }, 100);
    }

    document.getElementById('createHomeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Gather devices
        const deviceEntries = document.querySelectorAll('.device-entry');
        const devices = [];
        deviceEntries.forEach(entry => {
            const nameInput = entry.querySelector('input[type="text"]');
            const typeSelect = entry.querySelector('select');
            if (nameInput && typeSelect) {
                devices.push({
                    device_name: nameInput.value,
                    device_type: typeSelect.value
                });
            }
        });
        
        const apartmentNumber = document.getElementById('apartmentNumber').value;
        const payload = {
            name: `Apartment ${apartmentNumber}`,
            apartment_number: apartmentNumber,
            owner_name: document.getElementById('ownerName').value,
            owner_email: document.getElementById('ownerEmail').value,
            owner_phone: document.getElementById('ownerPhone').value,
            devices: devices
        };
        
        try {
            const response = await fetch('/create-home', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            
            if (response.ok) {
                const result = await response.json();
                showToast('Home & Devices Registered Successfully!');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } else {
                const err = await response.json();
                alert('Error: ' + (err.detail || 'Failed to register home'));
            }
        } catch (error) {
            alert('Connection error: ' + error.message);
        }
    });
</script>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<script>
(function () {
    const allowedDomains = ["gmail.com", "hotmail.com", "outlook.com", "live.com", "yahoo.com", "icloud.com"];

    function scriptOfWord(word) {
        if (/^[\p{Script=Arabic}\p{Mark}]+$/u.test(word)) return "arabic";
        if (/^[\p{Script=Latin}\p{Mark}]+$/u.test(word)) return "latin";
        if (/^[\p{Script=Han}\p{Mark}]+$/u.test(word)) return "han";
        if (/^[\p{Script=Cyrillic}\p{Mark}]+$/u.test(word)) return "cyrillic";
        if (/^[\p{Script=Greek}\p{Mark}]+$/u.test(word)) return "greek";
        if (/^[\p{Letter}\p{Mark}]+$/u.test(word)) return "other";
        return "";
    }

    function validOwnerName(value) {
        const parts = String(value || "").trim().split(/\s+/u).filter(Boolean);
        if (parts.length !== 4) return false;
        const scripts = parts.map(scriptOfWord);
        if (scripts.some(s => !s)) return false;
        return scripts.every(s => s === scripts[0]);
    }

    function validEmail(value) {
        const v = String(value || "").trim().toLowerCase();
        const match = v.match(/^[a-z0-9._%+-]+@([a-z0-9.-]+\.[a-z]{2,})$/i);
        return !!match && allowedDomains.includes(match[1]);
    }

    function bySelectors(selectors) {
        for (const s of selectors) {
            const el = document.querySelector(s);
            if (el) return el;
        }
        return null;
    }

    function fields(scope) {
        scope = scope || document;
        return {
            apartment: scope.querySelector('input[name="apartment_number"], input[id*="apartment" i], input[placeholder*="36"]'),
            owner: scope.querySelector('input[name="owner_name"], input[id*="owner" i][id*="name" i], input[placeholder*="John Doe" i]'),
            email: scope.querySelector('input[name="owner_email"], input[type="email"], input[id*="email" i], input[placeholder*="john@example" i]')
        };
    }

    function validateScope(scope) {
        const f = fields(scope);
        if (f.apartment && !/^\d+$/.test(f.apartment.value.trim())) {
            alert("Apartment Number must contain digits only.");
            f.apartment.focus();
            return false;
        }
        if (f.owner && !validOwnerName(f.owner.value)) {
            alert("Owner Name must be exactly 4 names, letters only, all in one writing system.");
            f.owner.focus();
            return false;
        }
        if (f.email && !validEmail(f.email.value)) {
            alert("Owner Email must be a valid email using gmail.com, hotmail.com, outlook.com, live.com, yahoo.com, or icloud.com.");
            f.email.focus();
            return false;
        }
        return true;
    }

    function normalizeDefaultDeviceInputs() {
        document.querySelectorAll("input").forEach(input => {
            const value = input.value.trim();
            if (value === "Front Door Camera" || value === "Main Energy Meter") {
                input.placeholder = value;
                input.dataset.defaultDeviceName = value;
                input.value = "";
            }
        });
    }

    function fillDefaultDeviceNames() {
        document.querySelectorAll("input").forEach(input => {
            const row = input.closest("div, tr, section, fieldset") || input.parentElement;
            const select = row ? row.querySelector("select") : null;
            const type = select ? String(select.value || "").toLowerCase() : "";

            if (!input.value.trim()) {
                if (input.dataset.defaultDeviceName) {
                    input.value = input.dataset.defaultDeviceName;
                } else if (type.includes("smart_door")) {
                    input.value = "Front Door Camera";
                } else if (type.includes("energy_monitor") || type.includes("energy")) {
                    input.value = "Main Energy Meter";
                }
            }
        });
    }

    document.addEventListener("DOMContentLoaded", function () {
        normalizeDefaultDeviceInputs();

        document.querySelectorAll("form").forEach(form => {
            form.addEventListener("submit", function (e) {
                if (!validateScope(form)) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    return false;
                }
                fillDefaultDeviceNames();
            }, true);
        });

        document.addEventListener("click", function (e) {
            const btn = e.target.closest("button, input[type='submit']");
            if (!btn) return;
            const text = (btn.textContent || btn.value || "").toLowerCase();
            if (text.includes("save") || text.includes("register") || text.includes("create")) {
                const modal = btn.closest(".modal, [role='dialog'], .dialog, .popup") || document;
                if (!validateScope(modal)) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    return false;
                }
                fillDefaultDeviceNames();
            }
        }, true);
    });
})();
</script>

<!-- D7M16_CREATE_HOME_VALIDATION_V6_END -->
{% endblock %}




<!-- D7_OWNER_PHONE_9_DIGITS_VALIDATION_START -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const phoneInput = document.getElementById("ownerPhone");
    if (!phoneInput) return;

    phoneInput.addEventListener("input", function () {
        this.value = this.value.replace(/[^0-9]/g, "").slice(0, 9);
    });

    const form = document.getElementById("createHomeForm");
    if (!form) return;

    form.addEventListener("submit", function (event) {
        const phone = phoneInput.value.trim();

        if (!/^[0-9]{9}$/.test(phone)) {
            event.preventDefault();
            event.stopImmediatePropagation();
            alert("Owner Phone must be exactly 9 English digits.");
            phoneInput.focus();
            return false;
        }
    }, true);
});
</script>
<!-- D7_OWNER_PHONE_9_DIGITS_VALIDATION_END -->
