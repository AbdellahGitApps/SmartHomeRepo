{% extends "base.html" %}
{% block title %}Create Home{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-title">
        <h1>Register New Home</h1>
        <p>Add a new home to the Edge Smart System</p>
    </div>
</div>

<div class="glass-card" style="max-width: 800px;">
    <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Home Created!');">
        
        <h3 style="margin-bottom: 20px; color: var(--accent-primary); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">Home Details</h3>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="homeName">Home Name / Identifier</label>
                <input type="text" id="homeName" class="form-control" placeholder="e.g. Villa 102" required>
            </div>
            <div class="form-group">
                <label for="ownerName">Owner Name</label>
                <input type="text" id="ownerName" class="form-control" placeholder="Full Name" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="ownerEmail">Owner Email</label>
            <input type="email" id="ownerEmail" class="form-control" placeholder="email@example.com" required>
        </div>

        <h3 style="margin-bottom: 20px; margin-top: 30px; color: var(--accent-primary); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">Device Registration</h3>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="meterId">Smart Meter Device ID</label>
                <input type="text" id="meterId" class="form-control" placeholder="METER-XXXX" required>
            </div>
            <div class="form-group">
                <label for="cameraId">ESP32-CAM Device ID</label>
                <input type="text" id="cameraId" class="form-control" placeholder="CAM-XXXX" required>
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Administrative Notes</label>
            <textarea id="notes" class="form-control" rows="4" placeholder="Any additional notes..."></textarea>
        </div>

        <div style="display: flex; gap: 16px; margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--glass-border);">
            <button type="submit" class="btn btn-primary"><i class="ph ph-check"></i> Register Home</button>
            <button type="reset" class="btn btn-outline"><i class="ph ph-arrow-counter-clockwise"></i> Reset Form</button>
        </div>
    </form>
</div>
{% endblock %}
